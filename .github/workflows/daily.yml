name: Daily Long COVID News

on:
  schedule:
    - cron: '0 13 * * *'   # 8am ET (UTC-5) / 9am EDT (UTC-4) — runs year-round
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent/run.py

      - name: Commit and push if changed
        run: |
          git config user.name  "Long COVID News Bot"
          git config user.email "bot@longcovidnews.com"
          git add articles.json
          git diff --cached --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d')"
          git push
