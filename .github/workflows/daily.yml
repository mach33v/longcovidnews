name: Daily Long COVID News

on:
  schedule:
    - cron: '0 13 * * *'   # 8am ET daily
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent/run.py

      - name: Commit updated articles
        run: |
          git config user.name  "Long COVID News Bot"
          git config user.email "bot@longcovidnews.com"
          git add articles.json
          git diff --cached --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: team_mxgswg0H6H5qIXHzQ2rW3LRE
          VERCEL_PROJECT_ID: prj_OcpK1ADGdP3QkbZnm0XJpn5wyOAC
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, urllib.error, os, time

          token   = os.environ["VERCEL_TOKEN"]
          team_id = os.environ["VERCEL_TEAM_ID"]
          proj_id = os.environ["VERCEL_PROJECT_ID"]

          def read(path):
              with open(path) as f: return f.read()

          deployment = {
              "name": "longcovidnews",
              "files": [
                  {"file": "index.html",    "data": read("index.html")},
                  {"file": "style.css",     "data": read("style.css")},
                  {"file": "app.js",        "data": read("app.js")},
                  {"file": "articles.json", "data": read("articles.json")},
                  {"file": "vercel.json",   "data": read("vercel.json")},
              ],
              "projectSettings": {"framework": None},
              "target": "production"
          }

          req = urllib.request.Request(
              f"https://api.vercel.com/v13/deployments?teamId={team_id}",
              data=json.dumps(deployment).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              dep_id = json.loads(r.read())["id"]
          print(f"Deploying {dep_id}...")

          for _ in range(24):
              time.sleep(5)
              req2 = urllib.request.Request(
                  f"https://api.vercel.com/v13/deployments/{dep_id}?teamId={team_id}",
                  headers={"Authorization": f"Bearer {token}"}
              )
              with urllib.request.urlopen(req2) as r:
                  d = json.loads(r.read())
              state = d.get("readyState")
              if state in ("READY","ERROR","CANCELED"):
                  print(f"Done: {state}")
                  break
          PYEOF
